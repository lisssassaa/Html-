<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Яндекс Доставка — Корзина</title>
  <!-- Шрифт интерфейса, похожий на Яндекс -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #f2f4f8;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 16px 12px 40px;
    }

    /* Карточка приложения — имитация экрана */
    .app-screen {
      max-width: 400px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.02);
      overflow: hidden;
      padding: 20px 16px 24px;
      transition: all 0.1s ease;
    }

    /* Верхняя панель (шапка) */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 20px;
      border-bottom: 1px solid #f0f2f5;
      margin-bottom: 20px;
    }

    .top-bar__back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #1a1f2e;
      font-weight: 500;
      font-size: 17px;
      letter-spacing: -0.2px;
      background: none;
      border: none;
      padding: 4px 0;
      cursor: default;
    }

    .top-bar__back svg {
      display: block;
    }

    .top-bar__title {
      font-size: 20px;
      font-weight: 600;
      color: #1a1f2e;
      letter-spacing: -0.3px;
    }

    .top-bar__actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-bar__icon {
      background: none;
      border: none;
      padding: 4px;
      cursor: default;
      color: #4a4f5e;
      display: flex;
      align-items: center;
    }

    /* Карточка товара */
    .cart-item {
      background: #f8fafd;
      border-radius: 24px;
      padding: 16px 16px 16px 18px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #eaedf2;
      transition: 0.1s;
    }

    .cart-item__info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cart-item__name {
      font-size: 18px;
      font-weight: 600;
      color: #1a1f2e;
      letter-spacing: -0.2px;
    }

    .cart-item__meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .cart-item__quantity {
      font-size: 15px;
      font-weight: 500;
      color: #4a4f5e;
      background: #eef1f5;
      padding: 2px 12px;
      border-radius: 40px;
      line-height: 1.5;
    }

    .cart-item__price {
      font-size: 16px;
      font-weight: 500;
      color: #1a1f2e;
      background: #ffffff;
      padding: 2px 12px;
      border-radius: 40px;
      border: 1px solid #e0e4eb;
      line-height: 1.5;
      display: inline-block;
    }

    .cart-item__image {
      width: 56px;
      height: 56px;
      background: #e6eaf0;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3d4457;
      font-weight: 500;
      font-size: 13px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="%23676d7d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 28px;
      background-color: #eef1f5;
      flex-shrink: 0;
    }

    /* Блок доставки */
    .delivery-block {
      background: #f8fafd;
      border-radius: 24px;
      padding: 18px 16px;
      margin-bottom: 20px;
      border: 1px solid #eaedf2;
    }

    .delivery-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }

    .delivery-label {
      font-size: 15px;
      color: #4a4f5e;
      font-weight: 450;
    }

    .delivery-value {
      font-size: 16px;
      font-weight: 500;
      color: #1a1f2e;
    }

    .delivery-value.free {
      color: #0b7e3d;
      font-weight: 600;
    }

    .delivery-date {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e4e8ef;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delivery-date__label {
      font-size: 15px;
      color: #4a4f5e;
      font-weight: 450;
    }

    .delivery-date__value {
      font-size: 16px;
      font-weight: 500;
      color: #1a1f2e;
      background: #eef4ff;
      padding: 4px 14px;
      border-radius: 40px;
      letter-spacing: -0.1px;
    }

    /* Блок итогов заказа */
    .order-total {
      background: #ffffff;
      border-radius: 24px;
      padding: 18px 0 8px;
      margin: 8px 0 24px;
      border-top: 1px solid #eaedf2;
      border-bottom: 1px solid #eaedf2;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 15px;
      color: #1a1f2e;
    }

    .total-row .label {
      font-weight: 450;
      color: #4a4f5e;
    }

    .total-row .value {
      font-weight: 500;
    }

    .total-row.total-sum {
      font-size: 18px;
      font-weight: 600;
      padding-top: 14px;
      margin-top: 6px;
      border-top: 1px solid #eaedf2;
    }

    .total-row.total-sum .value {
      color: #1a1f2e;
    }

    /* Кнопка оформления */
    .checkout-btn {
      width: 100%;
      background: #ffde17;
      border: none;
      border-radius: 60px;
      padding: 18px 0;
      font-size: 18px;
      font-weight: 600;
      color: #1a1f2e;
      box-shadow: 0 4px 8px rgba(255, 222, 23, 0.3);
      transition: 0.1s ease;
      cursor: default;
      margin-top: 6px;
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .checkout-btn:active {
      transform: scale(0.98);
      background: #f5d00f;
    }

    /* Тонкая лишняя инфа — нет рекламы, водяных знаков */
    .extra-note {
      text-align: center;
      font-size: 11px;
      color: #9aa2b0;
      margin-top: 18px;
      letter-spacing: 0.2px;
      border-top: 1px solid #f0f2f5;
      padding-top: 18px;
    }

    /* адаптивные мелочи */
    @media (max-width: 420px) {
      .app-screen {
        border-radius: 24px;
        padding: 16px 12px 20px;
      }
      .top-bar__title {
        font-size: 18px;
      }
      .cart-item__name {
        font-size: 16px;
      }
      .delivery-date__value {
        font-size: 14px;
        padding: 3px 12px;
      }
    }

    /* Декоративный логотип (Яндекс стиль) */
    .logo-icon {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo-icon svg {
      display: block;
    }
    .logo-text {
      font-weight: 600;
      font-size: 17px;
      color: #1a1f2e;
      letter-spacing: -0.3px;
    }
    .logo-text span {
      color: #ffcc00;
    }
  </style>
</head>
<body>
  <div class="app-screen">

    <!-- Верхняя панель -->
    <div class="top-bar">
      <div class="top-bar__back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 18L9 12L15 6" stroke="#1A1F2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Назад</span>
      </div>
      <div class="top-bar__title">Корзина</div>
      <div class="top-bar__actions">
        <div class="top-bar__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 21L20 21" stroke="#4A4F5E" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M4 10L20 10" stroke="#4A4F5E" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M4 3L20 3" stroke="#4A4F5E" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Карточка товара: Иван Кинёв, 1 шт, 1 кружка маккофе -->
    <div class="cart-item">
      <div class="cart-item__info">
        <div class="cart-item__name">Иван Кинёв</div>
        <div class="cart-item__meta">
          <span class="cart-item__quantity">1 шт</span>
          <span class="cart-item__price">1 кружка маккофе</span>
        </div>
      </div>
      <div class="cart-item__image"></div>
    </div>

    <!-- Блок доставки: бесплатная, доступна 12 июля -->
    <div class="delivery-block">
      <div class="delivery-row">
        <span class="delivery-label">Доставка</span>
        <span class="delivery-value free">Бесплатная</span>
      </div>
      <div class="delivery-date">
        <span class="delivery-date__label">Доступна</span>
        <span class="delivery-date__value">12 июля</span>
      </div>
    </div>

    <!-- Блок итогов заказа -->
    <div class="order-total">
      <div class="total-row">
        <span class="label">Товары (1)</span>
        <span class="value">1 кружка маккофе</span>
      </div>
      <div class="total-row">
        <span class="label">Доставка</span>
        <span class="value" style="color:#0b7e3d; font-weight:500;">0 ₽</span>
      </div>
      <div class="total-row total-sum">
        <span class="label">Итого</span>
        <span class="value">1 кружка маккофе</span>
      </div>
    </div>

    <!-- Кнопка оформления заказа -->
    <button class="checkout-btn" type="button">
      Оформить заказ
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="#1A1F2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Чистая верстка, без рекламы, без водяных знаков -->
    <div class="extra-note">
      Яндекс Доставка · 2026
    </div>

    <!-- Подпись в стиле "реалистичный UI" (маленькая, не мешает) -->
    <div style="height: 4px;"></div>
  </div>
</body>
</html>
